<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherWeb</title>
  <link rel="icon" type="image/png" href="WeatherWeb.png">
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
   
    .glass {
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.5);
    }
   
    .search-bar {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.28);
    }
   
    .unit-toggle {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 9999px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      flex-shrink: 0;
      width: 96px;
      height: 40px;
    }
   
    .unit-toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: rgba(255,255,255,0.28);
      border-radius: 9999px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
   
    .unit-toggle.celsius::after { transform: translateX(0); }
    .unit-toggle.fahrenheit::after { transform: translateX(100%); }
   
    .temp {
      font-size: clamp(4rem, 15vw, 7.8rem);
      line-height: 1;
      font-weight: 200;
      letter-spacing: -0.08em;
    }
   
    .map-container {
      height: 320px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
    }
    @media (min-width: 640px) {
      .map-container { height: 380px; }
    }
   
    #suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(24, 24, 27, 0.98);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 9999;
      box-shadow: 0 30px 60px -20px rgb(0 0 0 / 0.7);
      display: none;
      margin-top: 6px;
    }
   
    .suggestion-item {
      padding: 14px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover {
      background: rgba(255,255,255,0.15);
      padding-left: 28px;
    }
   
    .weather-scene {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      height: 320px;
    }
    @media (min-width: 640px) {
      .weather-scene { height: 380px; }
    }
    @media (min-width: 1024px) {
      .weather-scene { height: 440px; }
    }
   
    #weatherCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
   
    .location-box {
      border-radius: 24px;
      padding: 18px 22px;
    }
    @media (min-width: 640px) {
      .location-box { padding: 20px 28px; }
    }
   
    .daily-item {
      transition: all 0.3s ease;
    }
    .daily-item:hover {
      transform: translateY(-4px);
    }
   
    .copyright {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      margin-top: 2.5rem;
      padding-bottom: 1.5rem;
    }
   
    .hourly-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .hourly-scroll::-webkit-scrollbar { height: 4px; }
    .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .hourly-card {
      min-width: 80px;
      flex-shrink: 0;
      text-align: center;
    }
   
    .header-wrap {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-4 sm:p-6">
   
    <!-- Header -->
    <div class="header-wrap mb-8 sm:mb-12">
      <div class="header-logo">
        <i class="fa-solid fa-cloud-sun text-3xl sm:text-4xl text-sky-400"></i>
        <h1 class="text-2xl sm:text-3xl font-semibold tracking-tighter">WeatherWeb</h1>
      </div>
     
      <div class="header-search">
        <div class="search-bar rounded-3xl px-4 sm:px-6 py-3 sm:py-4 flex items-center gap-3 shadow-inner">
          <i class="fa-solid fa-magnifying-glass text-zinc-400 text-lg"></i>
          <input id="searchInput"
                 type="text"
                 placeholder="Stadt suchen..."
                 class="flex-1 bg-transparent focus:outline-none text-base sm:text-lg placeholder-zinc-400 min-w-0"/>
        </div>
        <div id="suggestions" class="glass"></div>
      </div>
     
      <div class="header-actions">
        <div onclick="switchUnit()" id="unitToggle"
             class="unit-toggle celsius flex items-center px-1 cursor-pointer">
          <div class="flex-1 text-center text-sm font-semibold z-10 text-white" id="unitC">°C</div>
          <div class="flex-1 text-center text-sm font-semibold z-10 text-white" id="unitF">°F</div>
        </div>
       
        <button onclick="getCurrentLocation()"
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 px-4 sm:px-6 py-3 rounded-3xl flex items-center gap-2 transition-all active:scale-95 whitespace-nowrap">
          <i class="fa-solid fa-location-dot"></i>
          <span class="loc-btn-text font-medium text-sm">Mein Standort</span>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
      <div class="lg:col-span-2 space-y-6 sm:space-y-8">
       
        <!-- Current Weather -->
        <div id="currentWeatherCard" class="glass rounded-3xl weather-scene">
          <canvas id="weatherCanvas"></canvas>
         
          <div class="content-layer absolute inset-0 flex flex-col items-center justify-center text-center px-6 sm:px-8" style="z-index:2;">
            <div class="flex flex-col items-center gap-2">
              <div id="temperature" class="temp text-white">–</div>
              <div id="weatherDesc" class="text-xl sm:text-3xl text-zinc-100 font-light">Laden…</div>
            </div>
            <div class="flex justify-center gap-8 sm:gap-14 mt-8 sm:mt-16 text-base sm:text-lg flex-wrap">
              <div>Fühlt sich an wie <span id="feelsLike" class="font-medium">–</span></div>
              <div>Wind: <span id="windSpeed" class="font-medium">–</span></div>
            </div>
          </div>
        </div>

        <!-- City / Date -->
        <div class="glass location-box">
          <div class="flex items-center justify-between gap-4">
            <div class="min-w-0">
              <div id="cityName" class="text-lg sm:text-2xl font-medium truncate">Laden…</div>
              <div id="currentDateTime" class="text-zinc-300 mt-1 text-sm sm:text-base"></div>
            </div>
            <div id="weatherIconBig" class="text-5xl sm:text-7xl flex-shrink-0">⏳</div>
          </div>
        </div>

        <!-- Map -->
        <div class="glass rounded-3xl p-4 sm:p-6">
          <div class="flex items-center justify-between mb-4 px-1">
            <h2 class="text-base sm:text-xl font-semibold">Karte anklicken für Wetter am Ort</h2>
          </div>
          <div id="map" class="map-container"></div>
        </div>

        <!-- Hourly -->
        <div class="glass rounded-3xl p-5 sm:p-8">
          <h2 class="text-base sm:text-xl font-semibold mb-4 sm:mb-6">Nächste 12 Stunden</h2>
          <div id="hourlyForecast" class="hourly-scroll"></div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6 sm:space-y-8">
        <div class="glass rounded-3xl p-5 sm:p-8">
          <h2 class="text-base sm:text-xl font-semibold mb-5 sm:mb-6">Details</h2>
          <div class="grid grid-cols-2 gap-4 sm:gap-6">
            <div class="flex items-center gap-3 sm:gap-4">
              <i class="fa-solid fa-droplet text-sky-400 text-xl sm:text-2xl"></i>
              <div><p class="text-zinc-400 text-xs sm:text-sm">Luftfeuchtigkeit</p><p id="humidity" class="text-2xl sm:text-3xl font-light">–</p></div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
              <i class="fa-solid fa-wind text-sky-400 text-xl sm:text-2xl"></i>
              <div><p class="text-zinc-400 text-xs sm:text-sm">Windrichtung</p><p id="windDir" class="text-2xl sm:text-3xl font-light">–</p></div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
              <i class="fa-solid fa-eye text-sky-400 text-xl sm:text-2xl"></i>
              <div><p class="text-zinc-400 text-xs sm:text-sm">Sichtweite</p><p id="visibility" class="text-2xl sm:text-3xl font-light">–</p></div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
              <i class="fa-solid fa-sun text-amber-400 text-xl sm:text-2xl"></i>
              <div><p class="text-zinc-400 text-xs sm:text-sm">UV-Index</p><p id="uvIndex" class="text-2xl sm:text-3xl font-light">–</p></div>
            </div>
          </div>
        </div>

        <div class="glass rounded-3xl p-5 sm:p-8">
          <h2 class="text-base sm:text-xl font-semibold mb-5 sm:mb-6">7-Tage-Vorhersage</h2>
          <div id="dailyForecast" class="space-y-4 sm:space-y-6"></div>
        </div>
      </div>
    </div>

    <div class="copyright">© ProfessorFilou</div>
  </div>

  <!-- Firebase SDK + Besuch-Logging -->
  <script type="module">

    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCN1C1OtE1QWhOQldF98i1YdtBpQSDLiX4",
      authDomain: "ip-log-ff47c.firebaseapp.com",
      projectId: "ip-log-ff47c",
      storageBucket: "ip-log-ff47c.firebasestorage.app",
      messagingSenderId: "439689156234",
      appId: "1:439689156234:web:a0fe97c8c62cb5d35dbf73",
      databaseURL: "https://ip-log-ff47c-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Besuch in Firebase speichern
    window.logVisit = async (currentCity = "Unbekannt") => {
      try {
        const ipRes = await fetch("https://ipinfo.io/json");
        const ipData = await ipRes.json();

        const visitData = {
          timestamp: serverTimestamp(),
          ip: ipData.ip || "unbekannt",
          city: ipData.city || "unbekannt",
          region: ipData.region || "",
          country: ipData.country || "unbekannt",
          loc: ipData.loc || "",
          userAgent: navigator.userAgent,
          language: navigator.language,
          currentWeatherCity: currentCity,
          page: "WeatherWeb",
          referrer: document.referrer || "direkt"
        };

        const visitsRef = ref(db, 'visits');
        await push(visitsRef, visitData);

        console.log("✅ Besuch gespeichert:", currentCity);
      } catch (err) {
        console.warn("Besuch konnte nicht gespeichert werden:", err);
      }
    };
  </script>

  <script>
    /* ─────────────── State ─────────────── */
    let map, marker;
    let currentLat = 52.52, currentLon = 13.41;
    let currentUnit = 'C';
    let currentData = null;
    let canvas, ctx;
    let particles = [];
    let cloudObjs = [];
    let sunAngle = 0;
    let weatherType = 'sunny';

    /* ─────────────── Weather codes ─────────────── */
    const weatherCodes = {
      0: { desc: "Klarer Himmel", type: "sunny", icon: "☀️" },
      1: { desc: "Überwiegend klar", type: "sunny", icon: "🌤️" },
      2: { desc: "Teilweise bewölkt", type: "cloudy", icon: "⛅" },
      3: { desc: "Bewölkt", type: "cloudy", icon: "☁️" },
      45: { desc: "Nebel", type: "cloudy", icon: "🌫️" },
      48: { desc: "Gefrierender Nebel", type: "cloudy", icon: "🌫️" },
      51: { desc: "Leichter Nieselregen", type: "rain", icon: "🌦️" },
      53: { desc: "Nieselregen", type: "rain", icon: "🌧️" },
      55: { desc: "Starker Nieselregen", type: "rain", icon: "🌧️" },
      61: { desc: "Leichter Regen", type: "rain", icon: "🌧️" },
      63: { desc: "Regen", type: "rain", icon: "🌧️" },
      65: { desc: "Starker Regen", type: "rain", icon: "🌧️" },
      71: { desc: "Leichter Schneefall", type: "snow", icon: "❄️" },
      73: { desc: "Schneefall", type: "snow", icon: "❄️" },
      75: { desc: "Starker Schneefall", type: "snow", icon: "❄️" },
      80: { desc: "Leichte Schauer", type: "rain", icon: "🌦️" },
      81: { desc: "Regenschauer", type: "rain", icon: "🌦️" },
      82: { desc: "Starke Schauer", type: "rain", icon: "⛈️" },
      95: { desc: "Gewitter", type: "rain", icon: "⛈️" },
      96: { desc: "Gewitter mit Hagel", type: "rain", icon: "⛈️" },
      99: { desc: "Schweres Gewitter", type: "rain", icon: "⛈️" },
    };

    /* ─────────────── Helpers ─────────────── */
    function convertTemp(temp, toUnit) {
      return toUnit === 'F' ? Math.round((temp * 9/5) + 32) : Math.round(temp);
    }

    async function getCityName(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10&accept-language=de`);
        const data = await res.json();
        const parts = [];
        if (data.address) {
          const a = data.address;
          const city = a.city || a.town || a.village || a.county || '';
          const country = a.country || '';
          if (city) parts.push(city);
          if (country) parts.push(country);
        }
        return parts.length ? parts.join(', ') : `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      } catch (e) {
        return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      }
    }

    const windDirs = ["N","NO","O","SO","S","SW","W","NW"];
    function getWindDirection(deg) { return windDirs[Math.round(deg / 45) % 8]; }

    function updateDateTime() {
      const now = new Date();
      const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      document.getElementById("currentDateTime").textContent = `${dateStr} • ${timeStr}`;
    }

    /* ─────────────── Fetch weather ─────────────── */
    async function getWeather(lat, lon) {
      currentLat = lat; currentLon = lon;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m` +
        `&hourly=temperature_2m,weather_code` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
        `&timezone=auto&forecast_days=8`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        currentData = data;

        const city = await getCityName(lat, lon);
        document.getElementById("cityName").textContent = city;

        const code = data.current.weather_code;
        const w = weatherCodes[code] ?? { desc: "Unbekannt", icon: "⛅" };
        document.getElementById("weatherIconBig").textContent = w.icon;
        document.getElementById("weatherDesc").textContent = w.desc;

        updateDisplay(data);
        updateWeatherAnimation(code);
        updateMap(lat, lon);
        renderHourly(data.hourly, data.current.time);
        renderDaily(data.daily);

        // Besuch loggen, nachdem die Stadt geladen wurde
        setTimeout(() => {
          window.logVisit(city);
        }, 600);

      } catch (err) {
        console.error(err);
      }
    }

    function updateDisplay(data) {
      const temp = convertTemp(data.current.temperature_2m, currentUnit);
      const feels = convertTemp(data.current.apparent_temperature, currentUnit);
      const tempEl = document.getElementById("temperature");
      tempEl.style.transform = 'scale(1.06)';
      setTimeout(() => tempEl.style.transform = 'scale(1)', 280);
      tempEl.textContent = temp;
      document.getElementById("feelsLike").textContent = feels + "°" + currentUnit;
      document.getElementById("windSpeed").textContent = Math.round(data.current.wind_speed_10m) + " km/h";
      document.getElementById("humidity").textContent = data.current.relative_humidity_2m + "%";
      document.getElementById("windDir").textContent = getWindDirection(data.current.wind_direction_10m);
    }

    function switchUnit() {
      currentUnit = currentUnit === 'C' ? 'F' : 'C';
      const toggle = document.getElementById("unitToggle");
      toggle.classList.toggle("celsius", currentUnit === 'C');
      toggle.classList.toggle("fahrenheit", currentUnit === 'F');
      if (currentData) {
        updateDisplay(currentData);
        renderHourly(currentData.hourly, currentData.current.time);
        renderDaily(currentData.daily);
      }
    }

    /* ─────────────── Canvas Animation ─────────────── */
    function initCanvas() {
      canvas = document.getElementById("weatherCanvas");
      ctx = canvas.getContext("2d");

      function resize() {
        const card = document.getElementById("currentWeatherCard");
        canvas.width = card.offsetWidth;
        canvas.height = card.offsetHeight;
        initClouds();
      }

      new ResizeObserver(resize).observe(document.getElementById("currentWeatherCard"));
      resize();
      animate();
    }

    function initClouds() {
      cloudObjs = [];
      const layers = [
        { count: 3, yMin: 0.05, yMax: 0.22, sizeMin: 80, sizeMax: 140, speed: 0.15, opacity: 0.55 },
        { count: 4, yMin: 0.15, yMax: 0.38, sizeMin: 50, sizeMax: 100, speed: 0.28, opacity: 0.70 },
        { count: 3, yMin: 0.25, yMax: 0.50, sizeMin: 30, sizeMax: 70, speed: 0.50, opacity: 0.85 },
      ];
      for (const l of layers) {
        for (let i = 0; i < l.count; i++) {
          cloudObjs.push({
            x: Math.random() * canvas.width * 1.4 - canvas.width * 0.2,
            y: canvas.height * (l.yMin + Math.random() * (l.yMax - l.yMin)),
            size: l.sizeMin + Math.random() * (l.sizeMax - l.sizeMin),
            speed: l.speed + Math.random() * 0.2,
            opacity: l.opacity + Math.random() * 0.12,
            layer: layers.indexOf(l),
          });
        }
      }
    }

    function drawCloud(x, y, size, opacity, dark) {
      const color = dark ? `rgba(160,170,180,${opacity})` : `rgba(240,245,255,${opacity})`;
      ctx.save();
      ctx.shadowBlur = dark ? 0 : 18;
      ctx.shadowColor = `rgba(255,255,255,${opacity * 0.3})`;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.ellipse(x, y, size, size * 0.52, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x - size * 0.58, y + size * 0.05, size * 0.62, size * 0.55, -0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + size * 0.55, y + size * 0.08, size * 0.58, size * 0.50, 0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x - size * 0.25, y - size * 0.35, size * 0.55, size * 0.48, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + size * 0.22, y - size * 0.30, size * 0.50, size * 0.44, 0.2, 0, Math.PI * 2); ctx.fill();

      const grad = ctx.createLinearGradient(x, y, x, y + size * 0.6);
      grad.addColorStop(0, `rgba(0,0,0,0)`);
      grad.addColorStop(1, dark ? `rgba(60,80,100,${opacity * 0.3})` : `rgba(150,170,200,${opacity * 0.18})`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.ellipse(x, y + size * 0.1, size * 0.9, size * 0.45, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function updateClouds(dark) {
      for (let layer = 0; layer <= 2; layer++) {
        for (const c of cloudObjs) {
          if (c.layer !== layer) continue;
          drawCloud(c.x, c.y, c.size, c.opacity, dark);
          c.x += c.speed;
          if (c.x > canvas.width + c.size * 1.5) c.x = -c.size * 1.5;
        }
      }
    }

    function drawSun() {
      const cx = canvas.width * 0.74;
      const cy = canvas.height * 0.26;
      const r = Math.min(55, canvas.width * 0.07);
      const grd = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 3.5);
      grd.addColorStop(0, 'rgba(253,224,71,0.35)');
      grd.addColorStop(1, 'rgba(253,224,71,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx, cy, r * 3.5, 0, Math.PI * 2); ctx.fill();

      ctx.save();
      ctx.shadowBlur = 40;
      ctx.shadowColor = '#fde047';
      ctx.fillStyle = '#fde047';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      sunAngle += 0.006;
      ctx.save();
      ctx.strokeStyle = 'rgba(253,224,71,0.7)';
      ctx.lineWidth = Math.max(2, canvas.width * 0.012);
      ctx.lineCap = 'round';
      for (let i = 0; i < 12; i++) {
        const a = (i * Math.PI * 2 / 12) + sunAngle;
        const x1 = cx + Math.cos(a) * (r + r * 0.35);
        const y1 = cy + Math.sin(a) * (r + r * 0.35);
        const x2 = cx + Math.cos(a) * (r + r * 1.25);
        const y2 = cy + Math.sin(a) * (r + r * 1.25);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      }
      ctx.restore();
    }

    function createRainParticles(n) {
      particles = [];
      for (let i = 0; i < n; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - 100,
          len: 12 + Math.random() * 18,
          speed: 12 + Math.random() * 16,
        });
      }
    }

    function updateRain() {
      ctx.strokeStyle = 'rgba(165,243,252,0.85)';
      ctx.lineWidth = 1.8;
      for (const p of particles) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - 3, p.y + p.len);
        ctx.stroke();
        p.y += p.speed;
        if (p.y > canvas.height) { p.y = -30; p.x = Math.random() * canvas.width; }
      }
    }

    function createSnowParticles(n) {
      particles = [];
      for (let i = 0; i < n; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: 3 + Math.random() * 5,
          speed: 1 + Math.random() * 2.5,
          sway: Math.random() * Math.PI * 2,
        });
      }
    }

    function updateSnow() {
      ctx.fillStyle = 'rgba(230,245,255,0.92)';
      const t = Date.now() / 700;
      for (const p of particles) {
        const sway = Math.sin(t + p.sway) * 2.2;
        ctx.beginPath();
        ctx.arc(p.x + sway, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.speed;
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const dark = (weatherType === 'rain' || weatherType === 'snow' || weatherType === 'cloudy');
      if (weatherType === 'sunny') drawSun();
      updateClouds(dark);
      if (weatherType === 'rain') updateRain();
      if (weatherType === 'snow') updateSnow();
      requestAnimationFrame(animate);
    }

    function updateWeatherAnimation(code) {
      const w = weatherCodes[code] ?? { type: 'cloudy' };
      weatherType = w.type;
      if (weatherType === 'rain') createRainParticles(90);
      else if (weatherType === 'snow') createSnowParticles(120);
      else particles = [];
    }

    /* ─────────────── Map ─────────────── */
    function updateMap(lat, lon) {
      if (!map) {
        map = L.map('map').setView([lat, lon], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        map.on('click', e => getWeather(e.latlng.lat, e.latlng.lng));
      } else {
        map.setView([lat, lon], map.getZoom());
      }
      if (marker) marker.remove();
      marker = L.marker([lat, lon]).addTo(map);
    }

    /* ─────────────── Hourly & Daily ─────────────── */
    function renderHourly(hourly, currentTimeStr) {
      const cont = document.getElementById("hourlyForecast");
      cont.innerHTML = "";
      const now = new Date(currentTimeStr);
      now.setMinutes(0, 0, 0);
      let startIdx = 0;
      for (let i = 0; i < hourly.time.length; i++) {
        const t = new Date(hourly.time[i]);
        if (t >= now) { startIdx = i; break; }
      }
      for (let i = startIdx; i < startIdx + 12 && i < hourly.time.length; i++) {
        const t = new Date(hourly.time[i]);
        const hrs = t.getHours().toString().padStart(2,'0') + ':00';
        const temp = convertTemp(hourly.temperature_2m[i], currentUnit);
        const code = hourly.weather_code[i];
        const icon = (weatherCodes[code] ?? { icon: '⛅' }).icon;

        const div = document.createElement("div");
        div.className = "hourly-card glass rounded-2xl py-4";
        div.innerHTML = `
          <p class="text-xs text-zinc-400 mb-1">${i === startIdx ? 'Jetzt' : hrs}</p>
          <p class="text-3xl my-2">${icon}</p>
          <p class="font-medium text-sm">${temp}°${currentUnit}</p>
        `;
        cont.appendChild(div);
      }
    }

    function renderDaily(daily) {
      const cont = document.getElementById("dailyForecast");
      cont.innerHTML = "";
      for (let i = 0; i < 7; i++) {
        const date = new Date(daily.time[i]);
        const day = date.toLocaleDateString('de-DE', { weekday: 'short' });
        const max = convertTemp(daily.temperature_2m_max[i], currentUnit);
        const min = convertTemp(daily.temperature_2m_min[i], currentUnit);
        const icon = (weatherCodes[daily.weather_code[i]] ?? { icon: '⛅' }).icon;

        const div = document.createElement("div");
        div.className = "daily-item flex items-center justify-between glass rounded-2xl p-3 sm:p-4";
        div.innerHTML = `
          <div class="w-12 sm:w-16 font-medium text-sm sm:text-base">${day}</div>
          <div class="text-3xl sm:text-4xl">${icon}</div>
          <div class="flex gap-3 sm:gap-5 text-sm sm:text-base">
            <span class="font-medium text-white">${max}°</span>
            <span class="text-zinc-400">${min}°</span>
          </div>
        `;
        cont.appendChild(div);
      }
    }

    /* ─────────────── Search ─────────────── */
    async function searchLocation(query) {
      const box = document.getElementById("suggestions");
      if (query.length < 2) { box.style.display = "none"; return; }
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=de&format=json`);
        const data = await res.json();
        box.innerHTML = "";
        if (data.results?.length) {
          data.results.forEach(loc => {
            const div = document.createElement("div");
            div.className = "suggestion-item text-sm";
            div.textContent = `${loc.name}${loc.admin1 ? ', ' + loc.admin1 : ''}, ${loc.country || ''}`.trim();
            div.onclick = () => {
              document.getElementById("searchInput").value = "";
              box.style.display = "none";
              getWeather(loc.latitude, loc.longitude);
            };
            box.appendChild(div);
          });
          box.style.display = "block";
        } else {
          box.style.display = "none";
        }
      } catch(e) { box.style.display = "none"; }
    }

    document.getElementById("searchInput").addEventListener("input", e => searchLocation(e.target.value));
    document.addEventListener("click", e => {
      if (!e.target.closest("#searchInput") && !e.target.closest("#suggestions"))
        document.getElementById("suggestions").style.display = "none";
    });

    /* ─────────────── Geolocation ─────────────── */
    function getCurrentLocation() {
      navigator.geolocation.getCurrentPosition(
        p => getWeather(p.coords.latitude, p.coords.longitude),
        () => getWeather(52.52, 13.41)
      );
    }

    /* ─────────────── Boot ─────────────── */
    window.onload = () => {
      initCanvas();
      document.getElementById("unitToggle").classList.add("celsius");
      updateDateTime();
      setInterval(updateDateTime, 30000);
      getCurrentLocation();
    };
  </script>
</body>
